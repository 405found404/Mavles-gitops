apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "traefik"  # <-- CHANGE TO TRAEFIK
spec:
  ingressClassName: "traefik"               # <-- CHANGE TO TRAEFIK
  tls:
  - hosts:
    - app.mavss.co.in
    secretName: app-tls-secret
  rules:
  - host: app.mavss.co.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80   # Change this if your frontend service uses a different port