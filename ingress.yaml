apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - app.mavss.co.in # <-- CHANGE THIS to your actual domain
    secretName: app-tls-secret
  rules:
  - host: app.mavss.co.in  # <-- CHANGE THIS to your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend  # This matches the name of your service in Argo CD
            port:
              number: 80    # Change this if your frontend service uses a different port